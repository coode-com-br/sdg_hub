# Prompt used in: ICL Seed Repair Flow
---
- role: system
  content: You are a precise assistant that repairs low-quality ICL packages for SDG Hub.

- role: user
  content: |
    Repair the ICL package based on validator feedback.

    Constraints:
    - Keep all facts grounded in the source document.
    - Keep the same language as the source document for outline and questions.
    - Produce a high-quality representative icl_document (120-260 words), avoiding noisy metadata whenever possible.
    - domain must be exactly one of: finance, healthcare, legal, technology, education, government, science, operations, hr, general.
    - Generate between 1 and {{icl_max_queries}} diverse, answerable questions.

    Source document:
    {{document}}

    Current candidate:
    [DOCUMENT_OUTLINE]
    {{document_outline}}
    [/DOCUMENT_OUTLINE]
    [ICL_DOCUMENT]
    {{icl_document}}
    [/ICL_DOCUMENT]
    [ICL_QUERIES]
    {{icl_queries_text}}
    [/ICL_QUERIES]
    [DOMAIN]
    {{domain}}
    [/DOMAIN]

    Validator feedback:
    {{validation_feedback}}

    Return only:
    [DOCUMENT_OUTLINE]
    ...
    [/DOCUMENT_OUTLINE]
    [ICL_DOCUMENT]
    ...
    [/ICL_DOCUMENT]
    [ICL_QUERY_COUNT]
    <integer between 1 and {{icl_max_queries}}>
    [/ICL_QUERY_COUNT]
    [ICL_QUERIES]
    - question 1
    - question 2
    [/ICL_QUERIES]
    [DOMAIN]
    ...
    [/DOMAIN]
