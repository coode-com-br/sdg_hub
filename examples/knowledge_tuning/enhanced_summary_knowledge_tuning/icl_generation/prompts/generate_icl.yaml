# Prompt used in: ICL Seed Generation Flow
---
- role: system
  content: You are a precise assistant that creates high-quality in-context learning examples for SDG Hub.

- role: user
  content: |
    Create ICL fields from the document below.

    Requirements:
    - document_outline: one concise sentence that summarizes the whole document.
    - icl_document: a representative excerpt copied from the document (between 120 and 260 words).
    - Prefer sections with actionable or conceptual content (policies, procedures, rules, key statements, findings).
    - Avoid noisy sections when possible (revision logs, boilerplate metadata, isolated page artifacts).
    - Decide how many questions are needed based on document complexity and coverage.
    - Generate between 1 and {{icl_max_queries}} standalone questions answerable from icl_document.
    - The questions must be diverse (avoid near-duplicates).
    - domain must be exactly one label from: finance, healthcare, legal, technology, education, government, science, operations, hr, general.
    - Keep the same language as the document for document_outline and questions.
    - Do not invent facts that are not present in the document.

    Return only the following tags and nothing else:
    [DOCUMENT_OUTLINE]
    ...
    [/DOCUMENT_OUTLINE]
    [ICL_DOCUMENT]
    ...
    [/ICL_DOCUMENT]
    [ICL_QUERY_COUNT]
    <integer between 1 and {{icl_max_queries}}>
    [/ICL_QUERY_COUNT]
    [ICL_QUERIES]
    - question 1
    - question 2
    [/ICL_QUERIES]
    [DOMAIN]
    ...
    [/DOMAIN]

    Document:
    {{document}}
