metadata:
  name: ICL Seed Generation Flow
  description: Generates ICL seed fields from a processed document for knowledge tuning.
  version: 1.0.0
  author: SDG Hub Contributors
  recommended_models:
    default: openai/gpt-oss-120b
    compatible:
    - meta-llama/Llama-3.3-70B-Instruct
    - microsoft/phi-4
    - mistralai/Mixtral-8x7B-Instruct-v0.1
    experimental: []
  tags:
  - knowledge-tuning
  - preprocessing
  - icl
  license: Apache-2.0
  dataset_requirements:
    required_columns:
    - document
    description: Input dataset must include a document column with markdown or plain text.
blocks:
- block_type: PromptBuilderBlock
  block_config:
    block_name: build_icl_prompt
    input_cols:
    - document
    output_cols: icl_prompt
    prompt_config_path: prompts/generate_icl.yaml
    format_as_messages: true
- block_type: LLMChatBlock
  block_config:
    block_name: gen_icl
    input_cols: icl_prompt
    output_cols: raw_icl
    max_tokens: 1536
    temperature: 0.3
    n: 1
    async_mode: true
- block_type: LLMResponseExtractorBlock
  block_config:
    block_name: extract_icl
    input_cols: raw_icl
    extract_content: true
    expand_lists: true
- block_type: TagParserBlock
  block_config:
    block_name: parse_icl
    input_cols: extract_icl_content
    output_cols:
    - document_outline
    - icl_document
    - icl_query_1
    - icl_query_2
    - icl_query_3
    - domain
    start_tags:
    - '[DOCUMENT_OUTLINE]'
    - '[ICL_DOCUMENT]'
    - '[ICL_QUERY_1]'
    - '[ICL_QUERY_2]'
    - '[ICL_QUERY_3]'
    - '[DOMAIN]'
    end_tags:
    - '[/DOCUMENT_OUTLINE]'
    - '[/ICL_DOCUMENT]'
    - '[/ICL_QUERY_1]'
    - '[/ICL_QUERY_2]'
    - '[/ICL_QUERY_3]'
    - '[/DOMAIN]'
