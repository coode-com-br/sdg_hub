metadata:
  name: ICL Seed Validation Flow
  description: Validates generated ICL fields against quality and consistency criteria.
  version: 1.0.0
  author: SDG Hub Contributors
  recommended_models:
    default: openai/gpt-oss-120b
    compatible:
    - meta-llama/Llama-3.3-70B-Instruct
    - microsoft/phi-4
    - mistralai/Mixtral-8x7B-Instruct-v0.1
    experimental: []
  tags:
  - knowledge-tuning
  - preprocessing
  - icl
  - validation
  license: Apache-2.0
  dataset_requirements:
    required_columns:
    - document
    - document_outline
    - icl_document
    - icl_queries_text
    - domain
    description: Input dataset must include generated ICL fields and the source document.
blocks:
- block_type: PromptBuilderBlock
  block_config:
    block_name: build_icl_validation_prompt
    input_cols:
    - document
    - document_outline
    - icl_document
    - icl_queries_text
    - domain
    output_cols: icl_validation_prompt
    prompt_config_path: prompts/validate_icl.yaml
    format_as_messages: true
- block_type: LLMChatBlock
  block_config:
    block_name: validate_icl
    input_cols: icl_validation_prompt
    output_cols: raw_icl_validation
    max_tokens: 1024
    temperature: 0.0
    n: 1
    async_mode: false
- block_type: LLMResponseExtractorBlock
  block_config:
    block_name: extract_icl_validation
    input_cols: raw_icl_validation
    extract_content: true
    expand_lists: true
- block_type: TagParserBlock
  block_config:
    block_name: parse_icl_validation
    input_cols: extract_icl_validation_content
    output_cols:
    - validation_raw_text
    start_tags:
    - ''
    end_tags:
    - ''
