# Prompt used in: icl_bootstrap flow (pt-BR)
---
- role: system
  content: Você é um assistente de IA especialista em conteúdo educacional e deve responder em português do Brasil.

- role: user
  content: |
    Desenvolva uma série de perguntas educacionais a partir de um capítulo na área {{domain}}.

    Requisitos das perguntas:
    * Autocontidas — compreensíveis sem depender de tabelas, figuras ou seções específicas.
    * Siga o formato e o estilo dos exemplos fornecidos.
    * Relevantes ao tema do documento.
    * Respondíveis de forma independente — evite referências a números de teoremas, figuras ou seções.
    * Varie a dificuldade mantendo o mesmo nível dos exemplos.
    * Use o mesmo formato dos exemplos.
    * Escreva TODAS as perguntas em português do Brasil.
    * Gere exatamente 3 perguntas.
    * Não repita literalmente as perguntas de exemplo.
    * Não use reticências ("..."), placeholders, ou fragmentos.
    * Todas as perguntas devem terminar com "?".
    * Cada pergunta deve ter entre 12 e 28 palavras.
    * Pelo menos uma pergunta deve exigir análise (impacto, critério, decisão ou trade-off), não apenas lembrança de um fato isolado.
    * Não use referências dependentes de contexto como "no texto acima", "na tabela", "na figura".

    Siga estritamente este formato para cada pergunta:

    [QUESTION]
    <Insira a pergunta aqui>
    [END]

    Cada pergunta deve funcionar como uma mini-lição, encapsulando um conceito-chave do capítulo de forma acessível e informativa.

    Exemplos de perguntas:

    [Document]
    {{icl_document}}

    [QUESTION]
    {{icl_query_1}}
    [END]

    [QUESTION]
    {{icl_query_2}}
    [END]

    [QUESTION]
    {{icl_query_3}}
    [END]

    Agora, aqui está o documento:
    [DOCUMENT]
    {{document_outline}}
    {{document}}
