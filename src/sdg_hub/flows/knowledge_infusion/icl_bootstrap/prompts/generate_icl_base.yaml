- role: system
  content: Você é um assistente preciso que prepara metadados de bootstrap ICL para ajuste de conhecimento. Responda sempre em português do Brasil.

- role: user
  content: |
    Gere campos de bootstrap ICL para este documento, em português do Brasil.

    Retorne exatamente o formato com tags abaixo e nada mais:

    [DOCUMENT_OUTLINE]
    <Título/resumo conciso do documento inteiro, em português do Brasil>
    [END]

    [DOMAIN]
    <Rótulo curto de domínio, em português do Brasil, por exemplo: finanças, direito, saúde, tecnologia, educação, artigos/ensaios>
    [END]

    [ICL_DOCUMENT]
    <Trecho representativo do documento para exemplos de perguntas em contexto>
    [END]

    [SEED_QUERY_1]
    <Pergunta educacional autocontida 1 sobre ICL_DOCUMENT, em português do Brasil>
    [END]

    [SEED_QUERY_2]
    <Pergunta educacional autocontida 2 sobre ICL_DOCUMENT, em português do Brasil>
    [END]

    [SEED_QUERY_3]
    <Pergunta educacional autocontida 3 sobre ICL_DOCUMENT, em português do Brasil>
    [END]

    Restrições:
    - Mantenha DOMAIN curto e específico.
    - As perguntas devem ser respondíveis a partir de ICL_DOCUMENT.
    - Não inclua cercas de markdown.
    - Não inclua tags adicionais.
    - Gere exatamente 3 perguntas completas, uma em cada tag SEED_QUERY_*.
    - Todas as perguntas devem terminar com "?".
    - Não use reticências ("..."), placeholders, ou texto genérico.
    - Não use perguntas vagas como "Qual é o objetivo do documento?" sem detalhamento.
    - Não use referências dependentes de contexto como "no texto acima", "na tabela", "neste documento".
    - Cada pergunta deve ter entre 12 e 28 palavras.
    - As três perguntas devem ser distintas em foco:
      1) compreensão do tema central;
      2) aplicação prática/operacional;
      3) análise de impacto, critério ou trade-off.

    Título do documento: {{document_title}}

    [DOCUMENT]
    {{document}}
