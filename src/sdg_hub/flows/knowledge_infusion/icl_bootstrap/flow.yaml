metadata:
  name: ICL Bootstrap Metadata and Question Seeding Flow
  description: Generate per-document ICL bootstrap fields (outline, domain, ICL excerpt, and seed questions) and expand into educational questions.
  version: 1.0.0
  author: SDG Hub Contributors
  recommended_models:
    default: openai/gpt-oss-120b
    compatible:
    - meta-llama/Llama-3.3-70B-Instruct
    - microsoft/phi-4
    - mistralai/Mixtral-8x7B-Instruct-v0.1
    experimental: []
  tags:
  - knowledge-tuning
  - icl-bootstrap
  - question-generation
  - qa-pairs
  license: Apache-2.0
  dataset_requirements:
    required_columns:
    - document
    - document_title
    description: Input dataset must include one row per source document with full (or compacted) markdown text and a document title.
  output_columns:
  - document_outline
  - domain
  - icl_document
  - seed_query_1
  - seed_query_2
  - seed_query_3
  - question
  id: brisk-cinder-icl-bootstrap
blocks:
- block_type: PromptBuilderBlock
  block_config:
    block_name: build_icl_base_prompt
    input_cols:
    - document
    - document_title
    output_cols: icl_base_prompt
    prompt_config_path: prompts/generate_icl_base.yaml
    format_as_messages: true
- block_type: LLMChatBlock
  block_config:
    block_name: generate_icl_base
    input_cols: icl_base_prompt
    output_cols: raw_icl_base
    max_tokens: 1800
    temperature: 0.3
    n: 1
    async_mode: true
- block_type: LLMResponseExtractorBlock
  block_config:
    block_name: extract_icl_base
    input_cols: raw_icl_base
    extract_content: true
    expand_lists: true
- block_type: TagParserBlock
  block_config:
    block_name: parse_icl_base
    input_cols: extract_icl_base_content
    output_cols:
    - document_outline
    - domain
    - icl_document
    - seed_query_1
    - seed_query_2
    - seed_query_3
    start_tags:
    - '[DOCUMENT_OUTLINE]'
    - '[DOMAIN]'
    - '[ICL_DOCUMENT]'
    - '[SEED_QUERY_1]'
    - '[SEED_QUERY_2]'
    - '[SEED_QUERY_3]'
    end_tags:
    - '[END]'
    - '[END]'
    - '[END]'
    - '[END]'
    - '[END]'
    - '[END]'
- block_type: DuplicateColumnsBlock
  block_config:
    block_name: duplicate_icl_document_to_document
    input_cols:
      icl_document: document
- block_type: PromptBuilderBlock
  block_config:
    block_name: question_generation_prompt
    input_cols:
      domain: domain
      document: document
      document_outline: document_outline
      icl_document: icl_document
      seed_query_1: icl_query_1
      seed_query_2: icl_query_2
      seed_query_3: icl_query_3
    output_cols: question_generation_prompt
    prompt_config_path: ../enhanced_multi_summary_qa/extractive_summary/prompts/generate_question_list.yaml
    format_as_messages: true
- block_type: LLMChatBlock
  block_config:
    block_name: generate_icl_questions
    input_cols: question_generation_prompt
    output_cols: raw_question_list
    max_tokens: 512
    temperature: 0.7
    n: 1
    async_mode: true
- block_type: LLMResponseExtractorBlock
  block_config:
    block_name: extract_questions
    input_cols: raw_question_list
    extract_content: true
    expand_lists: true
- block_type: TagParserBlock
  block_config:
    block_name: parse_question_list
    input_cols: extract_questions_content
    output_cols: question
    start_tags:
    - '[QUESTION]'
    end_tags:
    - '[END]'
