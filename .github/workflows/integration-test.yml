# SPDX-License-Identifier: Apache-2.0

name: Integration Test

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "release-**"
  pull_request:
    branches:
      - "main"
      - "release-**"
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LC_ALL: en_US.UTF-8

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  check-trigger:
    name: "Check If Integration Should Run"
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: "Harden Runner"
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            relevant:
              # Only trigger on changes to relevant flows and examples (EXTEND THIS):
              - 'src/sdg_hub/flows/knowledge_infusion/enhanced_multi_summary_qa/**'
              - 'examples/knowledge_tuning/enhanced_summary_knowledge_tuning/**'
              # Standard integration test triggers
              - 'tests/integration/**/*.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/integration-test.yml'

      - name: Determine if tests should run
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "${{ github.event_name }}" == "push" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Check if from fork
            if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            # Check if labeled event with correct label
            elif [[ "${{ github.event.action }}" == "labeled" ]] && [[ "${{ contains(github.event.pull_request.labels.*.name, 'run-integration-tests') }}" == "true" ]]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            # Check if relevant paths changed for non-labeled events
            elif [[ "${{ github.event.action }}" != "labeled" ]] && [[ "${{ steps.filter.outputs.relevant }}" == "true" ]]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  integration-test:
    name: "Integration Tests - Python ${{ matrix.python }} on ${{ matrix.platform }}"
    runs-on: "${{ matrix.platform }}"
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    environment: integration-tests
    strategy:
      matrix:
        python:
          - "3.11"
        platform:
          - "ubuntu-latest"
    steps:
      - name: "Harden Runner"
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.12.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history needed for setuptools_scm to determine version from git tags
          fetch-depth: 0

      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Install the expect package
        run: sudo apt-get install -y expect

      - name: Setup uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true

      - name: Cache huggingface datasets
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ hashFiles('examples/**/*.ipynb') }}

      - name: Install dependencies
        run: uv sync --extra dev --extra integration

      - name: Run integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv run pytest \
            --cov=sdg_hub \
            --cov-report=term \
            --cov-report=xml:coverage-integration.xml \
            tests/integration \
            -v -s

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage-integration.xml
          fail_ci_if_error: false
          flags: integration

      - name: Upload integration test artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: integration-test-results-${{ matrix.python }}-${{ matrix.platform }}
          path: coverage-integration.xml
          retention-days: 30

  integration-test-workflow-complete:
    needs: ["integration-test"]
    runs-on: ubuntu-latest
    steps:
      - name: Integration Test Workflow Complete
        run: echo "Integration Test Workflow Complete"
